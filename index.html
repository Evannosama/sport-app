<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Express - Vibe Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Inter', sans-serif; }
        .neon-border { border: 2px solid #3dfc64; box-shadow: 0 0 10px #3dfc64; }
        @keyframes squat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(40px) scaleY(0.8); }
        }
        .mannequin { animation: squat 2s infinite ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="home" class="text-center">
        <h1 class="text-4xl font-black mb-2 text-green-400">SPORT <span class="text-white">EXPRESS</span></h1>
        <p class="text-gray-400 mb-8 font-light italic">Prêt pour ta dose d'énergie ?</p>
        
        <div class="space-y-4">
            <p class="text-sm uppercase tracking-widest text-gray-500">Choisis ton temps</p>
            <div class="flex gap-4 justify-center">
                <button onclick="startApp(5)" class="neon-border px-6 py-3 rounded-full font-bold hover:bg-green-400 hover:text-black transition">5 MIN</button>
                <button onclick="startApp(10)" class="neon-border px-6 py-3 rounded-full font-bold hover:bg-green-400 hover:text-black transition">10 MIN</button>
                <button onclick="startApp(15)" class="neon-border px-6 py-3 rounded-full font-bold hover:bg-green-400 hover:text-black transition">15 MIN</button>
            </div>
        </div>
    </div>

    <div id="workout" class="hidden text-center w-full max-w-md">
        <div class="mb-8">
            <svg width="100" height="150" viewBox="0 0 100 150" class="mx-auto mannequin">
                <circle cx="50" cy="20" r="10" fill="#3dfc64" /> <line x1="50" y1="30" x2="50" y2="80" stroke="white" stroke-width="8" /> <line x1="50" y1="40" x2="20" y2="70" stroke="white" stroke-width="6" /> <line x1="50" y1="40" x2="80" y2="70" stroke="white" stroke-width="6" /> <line x1="50" y1="80" x2="30" y2="130" stroke="white" stroke-width="8" /> <line x1="50" y1="80" x2="70" y2="130" stroke="white" stroke-width="8" /> </svg>
        </div>
        
        <h2 id="ex-name" class="text-2xl font-bold mb-4 uppercase">Squats</h2>
        <div class="text-6xl font-black text-green-400 mb-6" id="timer">05:00</div>
        
        <button onclick="location.reload()" class="text-gray-500 underline text-sm">Abandonner</button>
    </div>

    <script>
        function startApp(minutes) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('workout').classList.remove('hidden');
            let seconds = minutes * 60;
            const timerEl = document.getElementById('timer');
            
            const countdown = setInterval(() => {
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                timerEl.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                if (seconds <= 0) {
                    clearInterval(countdown);
                    alert("Félicitations ! Séance terminée. +100 XP !");
                    location.reload();
                }
                seconds--;
            }, 1000);
        }
    </script>
</body>
</html>
